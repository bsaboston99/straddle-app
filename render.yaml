services:
  # ── FastAPI backend ───────────────────────────────────────────────────────
  - type: web
    name: insignia-api
    runtime: python
    rootDir: backend-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── React / Vite frontend ─────────────────────────────────────────────────
  - type: web
    name: insignia-app
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://insignia-api.onrender.com   # update after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
