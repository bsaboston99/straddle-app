services:
  # ── FastAPI backend ───────────────────────────────────────────────────────
  - type: web
    name: insignia-api
    runtime: python
    rootDir: backend-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

  # ── React / Vite frontend ─────────────────────────────────────────────────
  - type: web
    name: insignia-app
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://insignia-api-qkex.onrender.com
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Daily alert check cron ────────────────────────────────────────────────
  - type: cron
    name: insignia-alerts
    runtime: python
    rootDir: backend-api
    buildCommand: pip install requests
    schedule: "0 14 * * 1-5"  # 9am ET Mon–Fri (UTC-5)
    startCommand: python -c "import requests; requests.post('https://insignia-api-qkex.onrender.com/alerts/trigger')"
